steps:
  # Build the backend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gravitydrop-backend', './backend']
    
  # Push the backend container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gravitydrop-backend']
    
  # Deploy backend container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gravitydrop-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gravitydrop-backend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

  # Build the frontend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gravitydrop-frontend', './frontend']
    
  # Push the frontend container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gravitydrop-frontend']
    
  # Deploy frontend container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gravitydrop-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gravitydrop-frontend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/gravitydrop-backend'
  - 'gcr.io/$PROJECT_ID/gravitydrop-frontend'
